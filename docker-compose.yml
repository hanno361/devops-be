version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=sinpdb
      - POSTGRES_USER=sinpuser
      - POSTGRES_PASSWORD=sinppassword
    ports:
      - "5432:5432"

  web:
    build: .
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=sinpdb
      - DB_USER=sinpuser
      - DB_PASSWORD=sinppassword
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data:
